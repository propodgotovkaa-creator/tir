<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тир: найди слово</title>

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: Arial;
  background: #0d1238;
}

#game {
  position: relative;
  width: 100vw;
  height: 100vh;
  cursor: none;
}

.bg {
  position: absolute;
  inset: 0;
  background: radial-gradient(circle, #2b2f7a, #0d1238 70%);
}

.task-panel {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #fff;
  padding: 10px 20px;
  border-radius: 20px;
  display: flex;
  gap: 12px;
  align-items: center;
  z-index: 10;
}

.task-panel span {
  font-weight: 800;
  font-size: 22px;
}

.task-img {
  width: 80px;
}

.lives {
  position: absolute;
  top: 20px;
  left: 20px;
  z-index: 10;
}

.heart {
  font-size: 32px;
}

.heart.broken {
  opacity: 0.3;
}

.progress {
  position: absolute;
  top: 20px;
  right: 20px;
  background: #fff;
  padding: 8px 14px;
  border-radius: 14px;
  font-weight: 800;
}

.balloon {
  position: absolute;
  width: 150px;
  height: 180px;
  display: flex;
  justify-content: center;
  align-items: center;
  animation: flyUp 0.8s ease-out forwards;
}

.balloon-body {
  background: orange;
  border-radius: 50%;
  padding: 20px;
  font-weight: 900;
  text-align: center;
}

@keyframes flyUp {
  from { transform: translateY(300px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.gun {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 80px;
  z-index: 20;
}

.aim {
  position: absolute;
  width: 50px;
  height: 50px;
  border: 3px solid white;
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%, -50%);
  z-index: 30;
}

.aim-line {
  position: absolute;
  height: 3px;
  background: white;
  transform-origin: left;
  pointer-events: none;
  opacity: 0.5;
  z-index: 25;
}

.cross {
  position: absolute;
  font-size: 60px;
  color: red;
  z-index: 50;
}

.overlay {
  position: absolute;
  inset: 0;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.7);
}

.modal {
  background: white;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
}
</style>
</head>

<body>

<div id="game">

  <div class="bg"></div>

  <div class="task-panel">
    <span>Найди:</span>
    <img id="taskImg" class="task-img">
  </div>

  <div class="lives" id="lives"></div>
  <div class="progress" id="progress"></div>

  <div id="balloons"></div>

  <div class="gun">🔫</div>
  <div class="aim" id="aim"></div>
  <div class="aim-line" id="aimLine"></div>

  <div class="overlay" id="overlay">
    <div class="modal">
      <h2 id="finalText"></h2>
      <button onclick="init()">Играть снова</button>
    </div>
  </div>

</div>

<script>

const GAME_CONFIG = {
  roundsTotal: 8,
  livesTotal: 3,
  balloonsCount: 3,

  tasks: [
    { image: "https://dummyimage.com/100x100&text=🐶", correct: "собака", words: ["собака","сумка","сок"] },
    { image: "https://dummyimage.com/100x100&text=🦉", correct: "сова", words: ["сова","сыр","сок"] },
    { image: "https://dummyimage.com/100x100&text=✈️", correct: "самолет", words: ["самолет","сумка","сыр"] }
  ]
};

let round = 0;
let lives = GAME_CONFIG.livesTotal;

const balloonsBox = document.getElementById("balloons");
const taskImg = document.getElementById("taskImg");
const livesBox = document.getElementById("lives");
const progressBox = document.getElementById("progress");

function init() {
  round = 0;
  lives = GAME_CONFIG.livesTotal;
  document.getElementById("overlay").style.display = "none";
  renderLives();
  startRound();
}

function renderLives() {
  livesBox.innerHTML = "";
  for (let i=0;i<GAME_CONFIG.livesTotal;i++){
    const h = document.createElement("div");
    h.className = "heart" + (i>=lives?" broken":"");
    h.textContent = "❤️";
    livesBox.appendChild(h);
  }
}

function startRound() {
  balloonsBox.innerHTML = "";

  const task = GAME_CONFIG.tasks[round % GAME_CONFIG.tasks.length];
  taskImg.src = task.image;
  progressBox.textContent = `${round+1}/${GAME_CONFIG.roundsTotal}`;

  const positions = [20,50,80];

  task.words.forEach((word,i)=>{
    const b = document.createElement("div");
    b.className = "balloon";
    b.style.left = positions[i]+"%";
    b.style.top = "40%";

    const body = document.createElement("div");
    body.className = "balloon-body";
    body.textContent = word;

    b.appendChild(body);

    b.onclick = (e)=> shoot(word, task.correct, e);

    balloonsBox.appendChild(b);
  });
}

function shoot(word, correct, e) {

  if(word === correct){
    round++;

    if(round>=GAME_CONFIG.roundsTotal){
      win();
    } else {
      startRound();
    }

  } else {
    lives--;
    renderLives();

    showCross(e.clientX,e.clientY);

    if(lives<=0){
      lose();
    }
  }
}

function showCross(x,y){
  const c = document.createElement("div");
  c.className = "cross";
  c.textContent = "✖";
  c.style.left = x+"px";
  c.style.top = y+"px";
  document.body.appendChild(c);

  setTimeout(()=>c.remove(),600);
}

function win(){
  document.getElementById("overlay").style.display="flex";
  document.getElementById("finalText").textContent="Ты молодец!";
}

function lose(){
  document.getElementById("overlay").style.display="flex";
  document.getElementById("finalText").textContent="Попробуй ещё раз";
}

const aim = document.getElementById("aim");
const aimLine = document.getElementById("aimLine");

document.addEventListener("mousemove",(e)=>{
  aim.style.left = e.clientX+"px";
  aim.style.top = e.clientY+"px";

  const sx = window.innerWidth/2;
  const sy = window.innerHeight-50;

  const dx = e.clientX - sx;
  const dy = e.clientY - sy;

  const len = Math.sqrt(dx*dx + dy*dy);
  const ang = Math.atan2(dy,dx)*180/Math.PI;

  aimLine.style.left = sx+"px";
  aimLine.style.top = sy+"px";
  aimLine.style.width = len+"px";
  aimLine.style.transform = `rotate(${ang}deg)`;
});

init();

</script>
</body>
</html>
