<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тир: найди слово</title>

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: Arial;
  background: #0d1238;
}

#game {
  position: relative;
  width: 100vw;
  height: 100vh;
  cursor: none;
}

.bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
}

.task-panel {
  position: absolute;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  background: #fff;
  padding: 10px 18px;
  border-radius: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.task-img { width: 70px; }

.lives {
  position: absolute;
  top: 20px;
  left: 20px;
}

.progress {
  position: absolute;
  top: 20px;
  right: 20px;
  background: white;
  padding: 6px 12px;
  border-radius: 12px;
}

.balloon {
  position: absolute;
  width: 180px;
  height: 180px;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: flyUp 0.7s ease-out forwards;
}

.balloon img {
  width: 100%;
}

.word {
  position: absolute;
  font-weight: 900;
  font-size: 22px;
  color: #2b235b;
  text-align: center;
}

@keyframes flyUp {
  from { transform: translateY(300px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.gun {
  position: absolute;
  left: 50%;
  bottom: -18px;
  width: 330px;
  transform: translateX(-50%);
}

.gun img { width: 100%; }

.aim {
  position: absolute;
  width: 60px;
  height: 60px;
  border: 3px solid white;
  border-radius: 50%;
  transform: translate(-50%, -50%);
}

.aim-line {
  position: absolute;
  height: 2px;
  background: white;
  transform-origin: left;
}

.overlay {
  position: absolute;
  inset: 0;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.6);
}

.modal {
  background: white;
  padding: 20px;
  border-radius: 20px;
}
</style>
</head>

<body>

<div id="game">

  <div class="bg" id="bg"></div>

  <div class="task-panel">
    <span>Найди:</span>
    <img id="taskImg" class="task-img">
  </div>

  <div class="lives" id="lives"></div>
  <div class="progress" id="progress"></div>

  <div id="balloons"></div>

  <div class="aim-line" id="aimLine"></div>

  <div class="gun" id="gun">
    <img src="https://raw.githubusercontent.com/propodgotovkaa-creator/tir/a545558fc45369ee5aaf1a39612022d58b87dd32/%D0%BF%D0%B8%D1%81%D1%82%D0%BE%D0%BB%D0%B5%D1%8C%D1%82.png">
  </div>

  <div class="aim" id="aim"></div>

  <div class="overlay" id="overlay">
    <div class="modal">
      <h2 id="finalText"></h2>
      <button onclick="init()">Играть снова</button>
    </div>
  </div>

</div>

<script>

const CONFIG = {
  balloonY: 32, // ВЫШЕ ПИСТОЛЕТА

  balloons: [
    {
      normal: "https://raw.githubusercontent.com/propodgotovkaa-creator/tir/83ef03cf4fc77b38e378a95c7f9c2079a93ea6d1/left.png",
      pop: "https://raw.githubusercontent.com/propodgotovkaa-creator/tir/0f83b8c973764c348e295d9432e3cf7e31804160/pop.png"
    },
    {
      normal: "https://raw.githubusercontent.com/propodgotovkaa-creator/tir/36415665c0e2cbacb29068ef2a8c9e54c5ba24d1/center.png",
      pop: "https://raw.githubusercontent.com/propodgotovkaa-creator/tir/4158021f97731c2001fee8056568ba917a9090fc/pop.png"
    },
    {
      normal: "https://raw.githubusercontent.com/propodgotovkaa-creator/tir/c9a2b0ea64213d610aa22eb2e266888a524781bf/right.png",
      pop: "https://raw.githubusercontent.com/propodgotovkaa-creator/tir/88e3741bb8759326e3f0e75e4f07b4f297a8a6a2/pop.png"
    }
  ]
};

let round = 0;
let lives = 3;

function init(){
  round = 0;
  lives = 3;
  document.getElementById("overlay").style.display="none";
  startRound();
}

function startRound(){
  const box = document.getElementById("balloons");
  box.innerHTML="";

  const words = ["собака","сумка","сок"];
  const correct = "собака";

  const pos = [20,50,80];

  words.forEach((w,i)=>{
    const b = document.createElement("div");
    b.className="balloon";
    b.style.left = pos[i]+"%";
    b.style.top = CONFIG.balloonY+"%";

    const img = document.createElement("img");
    img.src = CONFIG.balloons[i].normal;

    const text = document.createElement("div");
    text.className="word";
    text.textContent=w;

    b.appendChild(img);
    b.appendChild(text);

    b.onclick = ()=>{
      if(w===correct){
        img.src = CONFIG.balloons[i].pop;
        setTimeout(()=>{
          round++;
          startRound();
        },1000);
      } else {
        lives--;
      }
    };

    box.appendChild(b);
  });
}

init();

</script>

</body>
</html>
