<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тир: найди слово</title>

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: #0d1238;
}

#game {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  cursor: none;
  background: #0d1238;
}

.bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  z-index: 0;
}

.task-panel {
  position: absolute;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 26px;
  border-radius: 24px;
  background: rgba(255,255,255,0.94);
  box-shadow: 0 10px 28px rgba(0,0,0,0.28);
}

.task-panel span {
  font-size: 26px;
  font-weight: 900;
  color: #30245f;
}

.task-word {
  font-size: 42px;
  font-weight: 900;
  color: #30245f;
  line-height: 1;
  text-transform: lowercase;
}

.lives {
  position: absolute;
  top: 22px;
  left: 22px;
  z-index: 20;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.heart {
  font-size: 34px;
  filter: drop-shadow(0 4px 6px rgba(0,0,0,0.35));
}

.heart.broken {
  opacity: 0.35;
  transform: rotate(-10deg) scale(0.9);
}

.progress {
  position: absolute;
  top: 22px;
  right: 22px;
  z-index: 20;
  padding: 10px 16px;
  border-radius: 18px;
  background: rgba(255,255,255,0.94);
  color: #30245f;
  font-size: 22px;
  font-weight: 900;
  box-shadow: 0 10px 28px rgba(0,0,0,0.26);
}

.balloon {
  position: absolute;
  width: 300px;
  height: 340px;
  display: flex;
  justify-content: center;
  align-items: center;
  animation: flyUp 0.9s ease-out forwards;
  z-index: 8;
}

.balloon img {
  width: 270px;
  height: 270px;
  object-fit: contain;
  display: block;
  pointer-events: none;
}

.balloon-word {
  position: absolute;
  left: 50%;
  top: -8px;
  transform: translateX(-50%);
  z-index: 3;
  font-size: 30px;
  font-weight: 900;
  color: #ffffff;
  text-align: center;
  line-height: 1.05;
  padding: 6px 14px;
  border-radius: 16px;
  background: rgba(30, 20, 80, 0.72);
  text-shadow: 0 3px 6px rgba(0,0,0,0.45);
  box-shadow: 0 6px 16px rgba(0,0,0,0.25);
  pointer-events: none;
  white-space: nowrap;
}

.balloon.popped .balloon-word {
  display: none;
}

@keyframes flyUp {
  from {
    transform: translateY(45vh) scale(0.85);
    opacity: 0;
  }
  to {
    transform: translateY(0) scale(1);
    opacity: 1;
  }
}

.gun {
  position: absolute;
  left: 50%;
  bottom: -18px;
  width: 330px;
  z-index: 40;
  pointer-events: none;
  transform-origin: 50% 90%;
  filter: drop-shadow(0 14px 18px rgba(0,0,0,0.45));
}

.gun img {
  width: 100%;
  height: auto;
  display: block;
}

.aim {
  position: absolute;
  width: 62px;
  height: 62px;
  border: 3px solid rgba(255,255,255,0.95);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 50;
  box-shadow:
    0 0 8px rgba(255,255,255,0.9),
    0 0 20px rgba(79,214,255,0.75),
    inset 0 0 12px rgba(79,214,255,0.45);
}

.aim::before,
.aim::after {
  content: "";
  position: absolute;
  background: rgba(255,255,255,0.95);
  box-shadow: 0 0 8px rgba(79,214,255,0.9);
}

.aim::before {
  width: 82px;
  height: 2px;
  left: -13px;
  top: 50%;
}

.aim::after {
  width: 2px;
  height: 82px;
  left: 50%;
  top: -13px;
}

.aim-dot {
  position: absolute;
  width: 8px;
  height: 8px;
  left: 50%;
  top: 50%;
  border-radius: 50%;
  background: #ff4747;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 10px #ff4747;
}

.aim-line {
  position: absolute;
  height: 3px;
  background: linear-gradient(90deg, rgba(79,214,255,0.05), rgba(79,214,255,0.75));
  transform-origin: left center;
  pointer-events: none;
  opacity: 0.65;
  z-index: 35;
  box-shadow: 0 0 12px rgba(79,214,255,0.6);
}

.shot-flash {
  position: absolute;
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: radial-gradient(circle, #fff 0%, #ffe66d 40%, transparent 75%);
  animation: flash 0.18s ease-out forwards;
  pointer-events: none;
  z-index: 55;
}

@keyframes flash {
  from { transform: scale(0.5); opacity: 1; }
  to { transform: scale(2.4); opacity: 0; }
}

.cross {
  position: absolute;
  z-index: 70;
  font-size: 72px;
  color: #ff3030;
  text-shadow: 0 4px 16px rgba(0,0,0,0.45);
  pointer-events: none;
  animation: crossAnim 0.65s ease-out forwards;
}

@keyframes crossAnim {
  from { transform: scale(0.4); opacity: 0; }
  40% { transform: scale(1.15); opacity: 1; }
  to { transform: scale(1); opacity: 0; }
}

.overlay {
  position: absolute;
  inset: 0;
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(8, 7, 30, 0.78);
  text-align: center;
}

.modal {
  width: min(560px, 90%);
  padding: 34px;
  border-radius: 32px;
  background: rgba(255,255,255,0.96);
  color: #30245f;
  box-shadow: 0 20px 60px rgba(0,0,0,0.38);
}

.modal h2 {
  margin: 0 0 14px;
  font-size: 38px;
}

.modal p {
  margin: 10px 0 24px;
  font-size: 24px;
  font-weight: 800;
}

.prize {
  font-size: 88px;
  margin-bottom: 10px;
}

button {
  border: 0;
  border-radius: 18px;
  padding: 14px 24px;
  font-size: 22px;
  font-weight: 900;
  color: white;
  background: linear-gradient(135deg, #7d5cff, #ff64c8);
  cursor: pointer;
}
</style>
</head>

<body>
<div id="game">
  <div class="bg" id="bg"></div>

  <div class="lives" id="lives"></div>
  <div class="progress" id="progress">1 / 8</div>

  <div class="task-panel">
    <span>Найди:</span>
    <div id="taskWord" class="task-word"></div>
  </div>

  <div id="balloons"></div>
  <div class="aim-line" id="aimLine"></div>

  <div class="gun" id="gun">
    <img src="https://raw.githubusercontent.com/propodgotovkaa-creator/tir/a545558fc45369ee5aaf1a39612022d58b87dd32/%D0%BF%D0%B8%D1%81%D1%82%D0%BE%D0%BB%D0%B5%D1%8C%D1%82.png" alt="Пистолет">
  </div>

  <div class="aim" id="aim">
    <div class="aim-dot"></div>
  </div>

  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="prize" id="prize">🧸</div>
      <h2 id="finalTitle">Молодец!</h2>
      <p id="finalText">Забери свою игрушку!</p>
      <button id="restartBtn">Играть снова</button>
    </div>
  </div>
</div>

<script>
const GAME_CONFIG = {
  roundsTotal: 8,
  livesTotal: 3,
  balloonsCount: 3,

  balloonFlyTime: 900,
  balloonStopY: 34,

  popDelay: 1000,

  aimPaddingX: 120,
  aimTopLimit: 130,
  aimBottomLimit: 520,

  gunMaxRotate: 24,

  showFeedback: true,

  backgroundImage: "https://raw.githubusercontent.com/propodgotovkaa-creator/tir/60fe98cf0899a039719a76c82b8cdf4f39200511/image.png",

  prizeEmoji: "🧸",

  balloonSkins: [
    {
      normal: "https://raw.githubusercontent.com/propodgotovkaa-creator/tir/83ef03cf4fc77b38e378a95c7f9c2079a93ea6d1/1.png",
      popped: "https://raw.githubusercontent.com/propodgotovkaa-creator/tir/0f83b8c973764c348e295d9432e3cf7e31804160/2.png"
    },
    {
      normal: "https://raw.githubusercontent.com/propodgotovkaa-creator/tir/36415665c0e2cbacb29068ef2a8c9e54c5ba24d1/3.png",
      popped: "https://raw.githubusercontent.com/propodgotovkaa-creator/tir/4158021f97731c2001fee8056568ba917a9090fc/4.png"
    },
    {
      normal: "https://raw.githubusercontent.com/propodgotovkaa-creator/tir/c9a2b0ea64213d610aa22eb2e266888a524781bf/5.png",
      popped: "https://raw.githubusercontent.com/propodgotovkaa-creator/tir/88e3741bb8759326e3f0e75e4f07b4f297a8a6a2/6.png"
    }
  ],

  tasks: [
    {
      correctWord: "собака",
      words: ["медуза", "собака", "сумка"]
    },
    {
      correctWord: "сова",
      words: ["сова", "сыр", "сок"]
    },
    {
      correctWord: "самолёт",
      words: ["самолёт", "санки", "сундук"]
    },
    {
      correctWord: "сыр",
      words: ["сумка", "сыр", "самокат"]
    },
    {
      correctWord: "сок",
      words: ["сок", "соты", "сапоги"]
    },
    {
      correctWord: "санки",
      words: ["сова", "санки", "сумка"]
    },
    {
      correctWord: "сумка",
      words: ["сыр", "сумка", "сок"]
    },
    {
      correctWord: "сундук",
      words: ["самокат", "сундук", "сова"]
    }
  ]
};

const game = document.getElementById("game");
const bg = document.getElementById("bg");
const taskWord = document.getElementById("taskWord");
const balloonsBox = document.getElementById("balloons");
const livesBox = document.getElementById("lives");
const progressBox = document.getElementById("progress");
const overlay = document.getElementById("overlay");
const finalTitle = document.getElementById("finalTitle");
const finalText = document.getElementById("finalText");
const prize = document.getElementById("prize");
const restartBtn = document.getElementById("restartBtn");
const aim = document.getElementById("aim");
const aimLine = document.getElementById("aimLine");
const gun = document.getElementById("gun");

let currentRound = 0;
let lives = GAME_CONFIG.livesTotal;
let locked = false;
let aimX = window.innerWidth / 2;
let aimY = window.innerHeight / 2;

function init() {
  currentRound = 0;
  lives = GAME_CONFIG.livesTotal;
  locked = false;

  overlay.style.display = "none";
  prize.textContent = GAME_CONFIG.prizeEmoji;
  bg.style.backgroundImage = `url("${GAME_CONFIG.backgroundImage}")`;

  renderLives();
  startRound();
  updateAim(aimX, aimY);
}

function renderLives() {
  livesBox.innerHTML = "";

  for (let i = 0; i < GAME_CONFIG.livesTotal; i++) {
    const heart = document.createElement("div");
    heart.className = "heart" + (i >= lives ? " broken" : "");
    heart.textContent = i >= lives ? "💔" : "❤️";
    livesBox.appendChild(heart);
  }
}

function startRound() {
  locked = false;
  balloonsBox.innerHTML = "";

  const task = GAME_CONFIG.tasks[currentRound % GAME_CONFIG.tasks.length];

  taskWord.textContent = task.correctWord;
  progressBox.textContent = `${currentRound + 1} / ${GAME_CONFIG.roundsTotal}`;

  createBalloons(task);
}

function createBalloons(task) {
  const words = shuffle([...task.words]).slice(0, GAME_CONFIG.balloonsCount);

  if (!words.includes(task.correctWord)) {
    words[0] = task.correctWord;
  }

  const positions = getBalloonPositions(words.length);

  words.forEach((word, index) => {
    const skin = GAME_CONFIG.balloonSkins[index % GAME_CONFIG.balloonSkins.length];

    const balloon = document.createElement("div");
    balloon.className = "balloon";
    balloon.style.left = `calc(${positions[index]}% - 150px)`;
    balloon.style.top = GAME_CONFIG.balloonStopY + "%";
    balloon.style.animationDuration = GAME_CONFIG.balloonFlyTime + "ms";

    const img = document.createElement("img");
    img.src = skin.normal;
    img.alt = "";

    const label = document.createElement("div");
    label.className = "balloon-word";
    label.textContent = word;

    balloon.appendChild(label);
    balloon.appendChild(img);

    balloon.addEventListener("click", (e) => {
      e.stopPropagation();
      shoot(balloon, img, skin, word, task.correctWord, aimX, aimY);
    });

    balloonsBox.appendChild(balloon);
  });
}

function getBalloonPositions(count) {
  if (count === 3) return [22, 50, 78];
  if (count === 4) return [18, 39, 61, 82];
  if (count === 5) return [12, 31, 50, 69, 88];

  const result = [];
  for (let i = 0; i < count; i++) {
    result.push(15 + (70 / Math.max(1, count - 1)) * i);
  }
  return result;
}

function shoot(balloon, img, skin, word, correctWord, x, y) {
  if (locked || balloon.dataset.popped === "true") return;

  createShotFlash(x, y);

  balloon.dataset.popped = "true";
  balloon.classList.add("popped");
  img.src = skin.popped;
  balloon.style.pointerEvents = "none";

  if (word === correctWord) {
    locked = true;

    setTimeout(() => {
      currentRound++;

      if (currentRound >= GAME_CONFIG.roundsTotal) {
        winGame();
      } else {
        startRound();
      }
    }, GAME_CONFIG.popDelay);

  } else {
    lives--;
    renderLives();

    if (GAME_CONFIG.showFeedback) {
      showCross(x, y);
    }

    setTimeout(() => {
      balloon.remove();

      if (lives <= 0) {
        locked = true;
        loseGame();
      }
    }, GAME_CONFIG.popDelay);
  }
}

function showCross(x, y) {
  const cross = document.createElement("div");
  cross.className = "cross";
  cross.textContent = "✖";
  cross.style.left = x - 34 + "px";
  cross.style.top = y - 50 + "px";
  game.appendChild(cross);

  setTimeout(() => cross.remove(), 650);
}

function createShotFlash(x, y) {
  const flash = document.createElement("div");
  flash.className = "shot-flash";
  flash.style.left = x - 19 + "px";
  flash.style.top = y - 19 + "px";
  game.appendChild(flash);

  setTimeout(() => flash.remove(), 200);
}

function winGame() {
  overlay.style.display = "flex";
  finalTitle.textContent = "Молодец!";
  finalText.textContent = "Забери свою игрушку!";
  prize.textContent = GAME_CONFIG.prizeEmoji;
}

function loseGame() {
  overlay.style.display = "flex";
  finalTitle.textContent = "Попробуй ещё раз!";
  finalText.textContent = "Жизни закончились.";
  prize.textContent = "💔";
}

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function clamp(value, min, max) {
  return Math.min(Math.max(value, min), max);
}

function updateAim(rawX, rawY) {
  const minX = GAME_CONFIG.aimPaddingX;
  const maxX = window.innerWidth - GAME_CONFIG.aimPaddingX;

  const minY = GAME_CONFIG.aimTopLimit;
  const maxY = Math.min(window.innerHeight - 180, GAME_CONFIG.aimBottomLimit);

  aimX = clamp(rawX, minX, maxX);
  aimY = clamp(rawY, minY, maxY);

  aim.style.left = aimX + "px";
  aim.style.top = aimY + "px";

  const startX = window.innerWidth / 2;
  const startY = window.innerHeight - 52;

  const dx = aimX - startX;
  const dy = aimY - startY;

  const length = Math.sqrt(dx * dx + dy * dy);
  const angle = Math.atan2(dy, dx) * 180 / Math.PI;

  aimLine.style.left = startX + "px";
  aimLine.style.top = startY + "px";
  aimLine.style.width = length + "px";
  aimLine.style.transform = `rotate(${angle}deg)`;

  const gunAngle = clamp(
    (aimX - startX) / (window.innerWidth / 2) * GAME_CONFIG.gunMaxRotate,
    -GAME_CONFIG.gunMaxRotate,
    GAME_CONFIG.gunMaxRotate
  );

  gun.style.transform = `translateX(-50%) rotate(${gunAngle}deg)`;
}

document.addEventListener("mousemove", (e) => {
  updateAim(e.clientX, e.clientY);
});

window.addEventListener("resize", () => {
  updateAim(aimX, aimY);
});

restartBtn.addEventListener("click", init);

init();
</script>
</body>
</html>
